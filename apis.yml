  - type: Features
    data:
      - name: Integrated Engineering Services
        description: Process, mechanical, civil, structural, electrical, instrumentation, and control engineering across the project lifecycle.
      - name: Project Support and Procurement
        description: Project management, procurement, and construction management for capital projects in energy and chemicals.
      - name: Technical Resourcing
        description: Short and long-term staff augmentation of skilled engineering and technical professionals for capital project requirements.
      - name: Multidisciplinary Delivery Centers
        description: Ten engineering centers delivering downstream and midstream oil and gas, petrochemicals, and infrastructure projects.
      - name: Sustainability Engineering
